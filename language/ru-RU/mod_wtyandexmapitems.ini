MOD_WTYANDEXMAPITEMS_USE_POPUP_DESC="<code>Нет</code> - при клике на маркер ничего не происходит. <code>По умолчанию</code> - стандартное всплывающее окно Яндекс.Карт. <code>Макет</code> - используется файл макета, указанный в поле. Если макет не указан в поле (пустое значение) - используем макет по умолчанию."
