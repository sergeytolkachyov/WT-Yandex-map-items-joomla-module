MOD_WTYANDEXMAPITEMS_MAP_CONTROL_POSITION="Положение"
MOD_WTYANDEXMAPITEMS_MAP_CONTROL_POSITION_DESC="<p>Укажите положение элемента интерфейса в окне карты. Для размещения по сторонам окна карты используйте значения <code>top</code>, <code>bottom</code>, <code>left</code>, <code>right</code>.</p><p>Значения можно сочетать, например <code>top left</code> разместит элемент сверху слева.</p><p>Для ориентации группы добавьте <code>horizontal</code> или <code>vertical</code>, например <code>top left horizontal</code>.</p><p>Если поле пустое, модуль выберет рекомендуемое положение для выбранного элемента: поиск - <code>top</code>, линейка масштаба - <code>bottom left</code>, масштаб и геолокация - <code>right</code>, 3D/поворот/наклон/полноэкранный режим - <code>top right</code>.</p>"
; Yandex map behavior fieldset
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_FIELDSET_LABEL="Поведение"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_DETECT_GEOLOCATION="Определять геопозицию?"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_DETECT_GEOLOCATION_DESC="Если да, то Яндекс.Карты будут пытаться определить местоположение пользователя. Браузер сделает запрос пользователю на разрешение определения местоположения."
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_SAVE_CAMERA="Запоминать вид карты (камеру)?"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_SAVE_CAMERA_DESC="В <code>localStorage</code> браузера пользователя будут сохраняться последний использованный центр (координаты) и масштаб (zoom) карты. Это позволит открыть карту в том же месте после обновления страницы или закрытия браузера. Возможно сохранять данные как каждого модуля по-отдельности, так и общие параметры для всех экземпляров модуля. В случае если выбран параметр <code>все модули</code> то активность в одном экземпляре модуля будет влиять на отображение карты в другом экземпляре."
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_SAVE_CAMERA_MODULE="Для модуля"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_SAVE_CAMERA_GENERAL="Все модули"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_MODULE_HANDLE_URL_GET_PARAMS_INFO="Карта может реагировать на GET-параметры в url: <ul><li><code>map[zoom]</code> - устанавливает параметр масштаба.</li><li><code>map[center_latitude]</code> и <code>map[center_longitude]</code> - широта и долгота центра карты.</li><li><code>map[marker_id]</code> - id маркера, на котором центрируется карта.</li></ul>"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_URL_GET_PARAM_MAP_MARKER_ID_CUSTOM_ZOOM="Параметр <code>zoom</code> для карты с GET-параметром <code>map[marker_id]</code>"
MOD_WTYANDEXMAPITEMS_YANDEX_MAP_PARAMS_BEHAVIOR_URL_GET_PARAM_MAP_MARKER_ID_CUSTOM_ZOOM_DESC="Установите параметр масштаба для карты, если в url обнаружен GET-параметр <code>map[marker_id]</code>. Это позволит приблизить масштаб и сфокусировать внимание на указанном в url маркере карты. Если указано <code>0</code>, то используется параметр масштаба для карты все карты (не изменяется)."
