MOD_WTYANDEXMAPITEMS_MAP_CUSTOMIZATION_FILE="Путь к JSON-файлу стиля карты"
MOD_WTYANDEXMAPITEMS_MAP_CUSTOMIZATION_FILE_DESC="<p>Укажите путь к JSON-файлу от корня сайта, например <code>/media/mod_wtyandexmapitems/map-style.json</code>.</p><p>Файл должен содержать JSON, экспортированный из редактора стилей Яндекс.Карт. Он применяется только для типа карты <code>Схема</code> через <code>YMapDefaultSchemeLayer.customization</code>.</p><p><a href=\"https://yandex.com/maps-api/docs/map-style-editor/index.html\" target=\"_blank\" rel=\"noopener\">Документация редактора стилей Яндекс.Карт</a><br><a href=\"https://yandex.com/maps-api/docs/js-api/map/customization.html\" target=\"_blank\" rel=\"noopener\">Документация кастомизации в JS API Яндекс.Карт</a></p>"
