MOD_WTYANDEXMAPITEMS_MAYBE_INTERESTING="<h4>Может быть интересно</h4><ul class=\"nav nav-tabs nav-stacked list-group\"><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/web-assets\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Joomla 4 & Joomla 5 Web Assets</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/joomshopping\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Расширения для JoomShopping</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/joomla-plugins\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Плагины Joomla</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/joomla-modules\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Модули Joomla</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/components\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Компоненты Joomla</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/biblioteki\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Библиотеки Joomla для разработчиков</a></li></ul>"
MOD_WTYANDEXMAPITEMS_WHATS_NEW = "<h3>v.2.2.0. Что нового?</h3><h4>Подключение пользовательского JSON-стиля карты</h4><p>Добавлен новый параметр в настройках отображения модуля: теперь можно указать путь к готовому JSON-файлу стиля карты от корня сайта. Модуль читает этот файл и применяет стиль к слою <code>Scheme</code> через <code>YMapDefaultSchemeLayer.customization</code>.</p><h4>Корректная работа нескольких модулей на одной странице</h4><p>Если на странице размещено несколько экземпляров модуля, каждый из них использует только свой JSON-стиль карты. Данные кастомизации передаются в JavaScript отдельно для каждого <code>module_id</code>, поэтому настройки одного экземпляра не подмешиваются к другому.</p><h4>Исправлена нестабильность общего сохранения вида карты</h4><p>Исправлена логика сохранения последнего положения карты между экземплярами модуля. При включённой опции <code>Все модули</code> один экземпляр сохраняет центр и масштаб карты, а другой экземпляр может подхватить эти же общие данные. При включённой опции <code>Для модуля</code> состояние остаётся изолированным для конкретного экземпляра.</p><h4>Сохранение только после действий пользователя</h4><p>Сохранение центра и масштаба карты теперь выполняется после завершения пользовательского действия с картой, а не во время инициализации или программного обновления карты. Это уменьшает риск перезаписи общих данных при загрузке страницы с несколькими картами.</p>"
