MOD_WTYANDEXMAPITEMS_WHATS_NEW = "<h3>v.2.3.2. Что нового?</h3><h4>Поддержка материалов из разных категорий</h4><p>Добавлена поддержка отображения материалов из разных категорий, добавленных с помощью плагина <a href=\"https://web-tolk.ru/dev/joomla-plugins/wt-multicategories\" target=\"_blank\" rel=\"noopener noreferrer\">WT Multicategories</a> или совместимых с ним.</p><h4>Настройки кластеризации</h4><p>Добавлены настройки кластеризации меток: включение и выключение кластеров, отображение количества маркеров, размер сетки и выбор маркера кластера: по умолчанию или изображение.</p><h4>Стабильнее метки и всплывающие окна</h4><p>Категорийные иконки, макеты меток и признак макета всплывающего окна применяются корректнее, если материал попал в выборку из дочерней или фактической категории результата.</p>"
