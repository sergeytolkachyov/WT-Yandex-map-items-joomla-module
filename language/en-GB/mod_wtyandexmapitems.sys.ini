MOD_WTYANDEXMAPITEMS_WHATS_NEW = "<h3>v.2.2.0. What's new?</h3><h4>Custom map style JSON file support</h4><p>A new display parameter has been added to the module settings: you can now specify the path to a ready JSON map style file from the site root. The module reads this file and applies the style to the <code>Scheme</code> layer via <code>YMapDefaultSchemeLayer.customization</code>.</p><h4>Correct behavior with multiple modules on the same page</h4><p>If several module instances are placed on one page, each of them uses only its own map style JSON file. Customization data is passed to JavaScript separately for each <code>module_id</code>, so one instance no longer leaks its style settings into another.</p><h4>Fixed unstable shared map view persistence</h4><p>The logic for saving the last map position between module instances has been fixed. When the <code>All modules</code> option is enabled, one instance saves the map center and zoom and another instance can reuse the same shared data. When the <code>This module</code> option is enabled, the saved state remains isolated for that specific module instance.</p><h4>Save only after user interaction</h4><p>The map center and zoom are now saved after the user finishes interacting with the map instead of during initialization or programmatic map updates. This reduces the risk of overwriting shared data when several maps are loaded on the same page.</p>"
