MOD_WTYANDEXMAPITEMS_WHATS_NEW = "<h3>v2.1.0. What's new?</h3><h4>Saving the last map view</h4><p>New options have been added that allow both for one instance of the module and for all to save the last used center (coordinates) and zoom (zoom) of the map on the user's device. This will allow you to open the map in the same place after refreshing the page or when opening the browser again.</p><h4>User geolocation detecting</h4><p>The module can detect the user's location and center the map on it. When used simultaneously with the function of saving the last map view, the location detection will be triggered only for the first time. In the future, if saved center and scale data are found, they will be used.</p><h4>CSS classes for map markers</h4><p>CSS class <code>wt-yandex-map-items-marker</code> has been added to all map markers. The CSS class <code>wt-yandex-map-items-marker-viewed</code> is added to the viewed markers (which were clicked on), which will allow you to highlight the viewed markers using styles in the CSS files of your template. Also, for marker containers <code>ymaps</code>, data attributes have been added to the map: <code>data-module-id</code> - module id and <code>data-marker-id</code> - marker id.</p><h4>URL GET parameters handling</h4><p>The map can handle URL GET-parameters: <ul><li><code>map[zoom]</code> - sets the zoom parameter.</li><li><code>map[center_latitude]</code> and <code>map[center_longitude]</code> - latitude and longitude of the map center.</li><li><code>map[marker_id]</code> - id of the marker where the map is centered.</li></ul></p><p>This way, you can create a link to the map with an indication of a specific marker that the map will focus on after the markers are loaded. For example, <code>https://site.ru/map?map [marker_id]=18465</code>.</p>"
